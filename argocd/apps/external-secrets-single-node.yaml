apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-single-node
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-25"
spec:
  project: default
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 0.11.0
      helm:
        valueFiles:
          - $values/helm/addons/external-secrets/single-node.yaml
    - repoURL: https://github.com/ozzus/platform-infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
