apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team1-registry-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: team1
  source:
    repoURL: https://github.com/ozzus/platform-infra.git
    targetRevision: main
    path: helm/charts/diasoft-registry
    helm:
      valueFiles:
        - ../../tenants/team1/prod/diasoft-registry.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: team1-prod-app
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
