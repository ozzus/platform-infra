apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-bootstrap-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: default
  source:
    repoURL: https://github.com/ozzus/platform-infra.git
    targetRevision: main
    path: argocd/manifests/prod/bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
