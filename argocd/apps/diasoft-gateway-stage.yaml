apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: diasoft-gateway-stage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://gitlab.com/ozzus/platform-infra.git
    targetRevision: main
    path: helm/charts/diasoft-gateway
    helm:
      valueFiles:
        - ../../environments/stage/diasoft-gateway.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: diasoft-stage
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
