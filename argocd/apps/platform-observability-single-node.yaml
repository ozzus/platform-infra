apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-observability-single-node
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: default
  source:
    repoURL: https://gitlab.example.com/platform-infra.git
    targetRevision: main
    path: argocd/manifests/single-node/observability
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
