apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-observability-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://gitlab.com/ozzus/platform-infra.git
    targetRevision: main
    path: argocd/manifests/prod/observability
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
