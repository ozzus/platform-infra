apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-single-node
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-30"
spec:
  project: default
  sources:
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.17.1
      helm:
        valueFiles:
          - $values/helm/addons/cert-manager/single-node.yaml
    - repoURL: https://gitlab.example.com/platform-infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
