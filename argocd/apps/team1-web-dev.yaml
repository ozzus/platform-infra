apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team1-web-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: team1
  source:
    repoURL: https://gitlab.com/ozzus/platform-infra.git
    targetRevision: main
    path: helm/charts/diasoft-web
    helm:
      valueFiles:
        - ../../tenants/team1/dev/diasoft-web.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: team1-dev-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
