apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://gitlab.example.com/platform-infra.git
    targetRevision: main
    path: helm/charts/keycloak
    helm:
      valueFiles:
        - ../../environments/prod/keycloak.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: diasoft-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
