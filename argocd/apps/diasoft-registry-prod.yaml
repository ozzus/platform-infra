apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: diasoft-registry-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/ozzus/platform-infra.git
    targetRevision: main
    path: helm/charts/diasoft-registry
    helm:
      valueFiles:
        - ../../environments/prod/diasoft-registry.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: diasoft-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
