apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: diasoft-web-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://gitlab.com/ozzus/platform-infra.git
    targetRevision: main
    path: helm/charts/diasoft-web
    helm:
      valueFiles:
        - ../../environments/dev/diasoft-web.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: diasoft-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
