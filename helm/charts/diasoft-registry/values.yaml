serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

image:
  repository: ghcr.io/ozzus/diasoft-registry/registry-api
  tag: latest

service:
  port: 8080
  metricsPort: 8080

ingress:
  enabled: false
  className: nginx
  host: registry.dev.example.com
  tls:
    enabled: false
    secretName: ""

app:
  securityEnabled: true
  runtimeModes:
    api: api
    importWorker: import-worker
    outboxPublisher: outbox-publisher

components:
  api:
    enabled: true
    replicas: 2
    startupProbe:
      enabled: true
      path: /readyz
      failureThreshold: 30
      periodSeconds: 10
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
  importWorker:
    enabled: true
    replicas: 1
    startupProbe:
      enabled: true
      path: /readyz
      failureThreshold: 30
      periodSeconds: 10
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 6
  outboxPublisher:
    enabled: true
    replicas: 1
    startupProbe:
      enabled: true
      path: /readyz
      failureThreshold: 30
      periodSeconds: 10
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3

resources:
  api:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 768Mi
  worker:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 768Mi

env:
  OBJECT_STORAGE_ENDPOINT: http://diasoft-object-storage:9000
  OBJECT_STORAGE_BUCKET: diploma-imports
  OBJECT_STORAGE_REGION: ru-central1
  OIDC_ISSUER_URI: http://keycloak:8080/realms/diasoft
  APP_ALLOWED_ORIGINS: "*"
  KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
  KAFKA_SASL_MECHANISM: SCRAM-SHA-512
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317

secretEnv:
  SPRING_DATASOURCE_URL: database_url
  SPRING_DATASOURCE_USERNAME: database_username
  SPRING_DATASOURCE_PASSWORD: database_password
  KAFKA_BOOTSTRAP_SERVERS: kafka_bootstrap_servers
  KAFKA_USERNAME: kafka_username
  KAFKA_PASSWORD: kafka_password
  OBJECT_STORAGE_ACCESS_KEY: object_storage_access_key
  OBJECT_STORAGE_SECRET_KEY: object_storage_secret_key

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: yandex-lockbox
    kind: ClusterSecretStore
  targetName: diasoft-registry-secrets
  data:
    - secretKey: database_url
      remoteRef:
        key: diasoft-registry
        property: database_url
    - secretKey: database_username
      remoteRef:
        key: diasoft-registry
        property: database_username
    - secretKey: database_password
      remoteRef:
        key: diasoft-registry
        property: database_password
    - secretKey: kafka_bootstrap_servers
      remoteRef:
        key: diasoft-registry
        property: kafka_bootstrap_servers
    - secretKey: kafka_username
      remoteRef:
        key: diasoft-registry
        property: kafka_username
    - secretKey: kafka_password
      remoteRef:
        key: diasoft-registry
        property: kafka_password
    - secretKey: object_storage_access_key
      remoteRef:
        key: diasoft-registry
        property: object_storage_access_key
    - secretKey: object_storage_secret_key
      remoteRef:
        key: diasoft-registry
        property: object_storage_secret_key

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  apiIngressPort: 8080
  egressPorts:
    - 53
    - 443
    - 5432
    - 9000
    - 9092
