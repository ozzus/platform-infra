{{- if .Values.components.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: diasoft-registry-api
spec:
  replicas: {{ .Values.components.api.replicas }}
  selector:
    matchLabels:
      app: diasoft-registry
      component: api
  template:
    metadata:
      labels:
        app: diasoft-registry
        component: api
    spec:
      serviceAccountName: {{ default "diasoft-registry" .Values.serviceAccount.name }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      containers:
        - name: registry-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_RUNTIME_MODE
              value: {{ .Values.app.runtimeModes.api | quote }}
            - name: APP_SECURITY_ENABLED
              value: {{ .Values.app.securityEnabled | quote }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.secretEnv }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalSecret.targetName | quote }}
                  key: {{ $value | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.service.port }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.service.port }}
          livenessProbe:
            httpGet:
              path: /livez
              port: {{ .Values.service.port }}
          {{- if .Values.components.api.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.components.api.startupProbe.path }}
              port: {{ .Values.service.port }}
            failureThreshold: {{ .Values.components.api.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.components.api.startupProbe.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
---
{{- end }}
