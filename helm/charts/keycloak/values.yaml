serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

image:
  repository: quay.io/keycloak/keycloak
  tag: "26.1.0"

replicas: 1
mode: dev

service:
  port: 8080

admin:
  existingSecret: ""
  usernameKey: username
  passwordKey: password

ingress:
  enabled: false
  className: nginx
  host: auth.dev.example.com
  tls:
    enabled: false
    secretName: ""

realm:
  name: diasoft
  frontendClientId: diasoft-web
  redirectUris:
    - http://localhost:5173/*
    - https://web.dev.example.com/*
    - https://web.stage.example.com/*
    - https://web.example.com/*
  postLogoutRedirectUris:
    - http://localhost:5173/*
    - https://web.dev.example.com/*
    - https://web.stage.example.com/*
    - https://web.example.com/*
  bootstrapUsers: []

env:
  KC_DB: postgres
  KC_HEALTH_ENABLED: "true"
  KC_METRICS_ENABLED: "true"
  KC_HTTP_ENABLED: "true"
  KC_PROXY_HEADERS: xforwarded
  KC_HOSTNAME_STRICT: "false"
  KC_DB_SCHEMA: public
  KC_DB_URL_DATABASE: keycloak

secretEnv:
  KC_DB_URL_HOST: db_host
  KC_DB_URL_PORT: db_port
  KC_DB_USERNAME: db_username
  KC_DB_PASSWORD: db_password

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: yandex-lockbox
    kind: ClusterSecretStore
  targetName: keycloak-secrets
  data:
    - secretKey: username
      remoteRef:
        key: keycloak-admin
        property: username
    - secretKey: password
      remoteRef:
        key: keycloak-admin
        property: password
    - secretKey: db_host
      remoteRef:
        key: keycloak
        property: db_host
    - secretKey: db_port
      remoteRef:
        key: keycloak
        property: db_port
    - secretKey: db_username
      remoteRef:
        key: keycloak
        property: db_username
    - secretKey: db_password
      remoteRef:
        key: keycloak
        property: db_password

startupProbe:
  enabled: true
  path: /health/started
  failureThreshold: 30
  periodSeconds: 10

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingressPort: 8080
  egressPorts:
    - 53
    - 443
    - 5432
