apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      serviceAccountName: {{ default "keycloak" .Values.serviceAccount.name }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      containers:
        - name: keycloak
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args:
            - {{ ternary "start-dev" "start" (eq .Values.mode "dev") }}
            - --import-realm
            - --http-port={{ .Values.service.port }}
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              {{- if or .Values.admin.existingSecret .Values.externalSecret.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ default .Values.externalSecret.targetName .Values.admin.existingSecret | quote }}
                  key: {{ .Values.admin.usernameKey | quote }}
              {{- else }}
              value: "admin"
              {{- end }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              {{- if or .Values.admin.existingSecret .Values.externalSecret.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ default .Values.externalSecret.targetName .Values.admin.existingSecret | quote }}
                  key: {{ .Values.admin.passwordKey | quote }}
              {{- else }}
              value: "admin"
              {{- end }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.secretEnv }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalSecret.targetName | quote }}
                  key: {{ $value | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.service.port }}
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import/diasoft-realm.json
              subPath: diasoft-realm.json
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ .Values.service.port }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ .Values.service.port }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.startupProbe.path }}
              port: {{ .Values.service.port }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
          {{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm-import
