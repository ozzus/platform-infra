apiVersion: apps/v1
kind: Deployment
metadata:
  name: diasoft-gateway-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: diasoft-gateway-api
  template:
    metadata:
      labels:
        app: diasoft-gateway-api
    spec:
      serviceAccountName: {{ default "diasoft-gateway" .Values.serviceAccount.name }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      containers:
        - name: gateway-api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.secretEnv }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalSecret.targetName | quote }}
                  key: {{ $value | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.api.service.port }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.api.service.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.service.port }}
          {{- if .Values.api.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.api.startupProbe.path }}
              port: {{ .Values.api.service.port }}
            failureThreshold: {{ .Values.api.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.api.startupProbe.periodSeconds }}
          {{- end }}
          resources:
{{ toYaml .Values.api.resources | indent 12 }}
