serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

image:
  repository: registry.example.com/diasoft-web/web
  tag: latest

service:
  port: 80

startupProbe:
  enabled: true
  path: /
  failureThreshold: 30
  periodSeconds: 10

runtimeConfig:
  VITE_AUTH_ENABLED: "false"
  VITE_OIDC_AUTHORITY: http://keycloak:8080/realms/diasoft
  VITE_OIDC_CLIENT_ID: diasoft-web
  VITE_OIDC_REDIRECT_URI: http://localhost:5173/
  VITE_OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:5173/
  VITE_GATEWAY_BASE_URL: http://diasoft-gateway-api:8080
  VITE_REGISTRY_BASE_URL: http://diasoft-registry-api:8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4

pdb:
  enabled: true
  minAvailable: 1

ingress:
  enabled: false
  className: nginx
  host: web.dev.example.com
  tls:
    enabled: false
    secretName: ""

networkPolicy:
  enabled: true
  allowedIngressPort: 80
  egressPorts:
    - 53
    - 80
    - 443
    - 8080
