image:
  tag: stage
ingress:
  enabled: true
  host: web.stage.example.com
  tls:
    enabled: true
    secretName: web-stage-tls
runtimeConfig:
  VITE_AUTH_ENABLED: "true"
  VITE_OIDC_AUTHORITY: https://auth.stage.example.com/realms/diasoft
  VITE_OIDC_CLIENT_ID: diasoft-web
  VITE_OIDC_REDIRECT_URI: https://web.stage.example.com/
  VITE_OIDC_POST_LOGOUT_REDIRECT_URI: https://web.stage.example.com/
  VITE_GATEWAY_BASE_URL: https://verify.stage.example.com
  VITE_REGISTRY_BASE_URL: https://registry.stage.example.com
