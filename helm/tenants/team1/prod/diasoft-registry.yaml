image:
  repository: ghcr.io/ozzus/diasoft-registry/registry-api
  tag: stable

ingress:
  enabled: true
  host: registry.diplomverify.ru
  tls:
    enabled: true
    secretName: team1-prod-registry-tls

env:
  OBJECT_STORAGE_ENDPOINT: http://minio.team1-prod-data.svc.cluster.local:9000
  OBJECT_STORAGE_BUCKET: team1-prod-diploma-imports
  OBJECT_STORAGE_REGION: ru-central1
  OIDC_ISSUER_URI: https://auth.diplomverify.ru/realms/diasoft-team1
  APP_ALLOWED_ORIGINS: "*"
  KAFKA_SECURITY_PROTOCOL: PLAINTEXT
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo.monitoring.svc.cluster.local:4317

externalSecret:
  enabled: false
  targetName: team1-registry-prod-secrets

deploymentMetadata:
  team: team1
  environment: prod
  imageTag: stable
  contractVersion: stable
