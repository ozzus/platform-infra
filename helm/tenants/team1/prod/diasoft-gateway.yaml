api:
  image:
    repository: registry.gitlab.com/ozzus/diasoft-gateway/gateway-api
    tag: stable
  ingress:
    enabled: true
    host: verify.diplomverify.ru
    tls:
      enabled: true
      secretName: team1-prod-verify-tls

consumer:
  image:
    repository: registry.gitlab.com/ozzus/diasoft-gateway/gateway-consumer
    tag: stable

replayer:
  image:
    repository: registry.gitlab.com/ozzus/diasoft-gateway/gateway-dlq-replayer
    tag: stable

env:
  HTTP_ALLOWED_ORIGINS: "*"
  HTTP_TRUSTED_PROXIES: 10.42.0.0/16,10.43.0.0/16,127.0.0.1/32
  KAFKA_SASL_ENABLED: "true"
  KAFKA_TLS_ENABLED: "false"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo.monitoring.svc.cluster.local:4317

externalSecret:
  enabled: false
  targetName: team1-gateway-prod-secrets

deploymentMetadata:
  team: team1
  environment: prod
  imageTag: stable
  registryContractVersion: stable
