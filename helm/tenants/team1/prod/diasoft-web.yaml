  VITE_OIDC_AUTHORITY: https://auth.diplomverify.ru/realms/diasoft-team1
  VITE_OIDC_CLIENT_ID: diasoft-web-team1
  VITE_OIDC_REDIRECT_URI: https://web.diplomverify.ru/
