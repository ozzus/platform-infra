  VITE_GATEWAY_BASE_URL: https://verify.diplomverify.ru
  VITE_REGISTRY_BASE_URL: https://registry.diplomverify.ru

ingress:
  enabled: true
  host: web.diplomverify.ru
  tls:
    enabled: true
    secretName: team1-prod-web-tls

deploymentMetadata:
  team: team1
  environment: prod
  imageTag: stable
  contractVersion: stable
