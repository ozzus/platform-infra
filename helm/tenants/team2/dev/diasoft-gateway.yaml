api:
  image:
    repository: ghcr.io/ozzus/diasoft-gateway/gateway-api
    tag: latest
  ingress:
    enabled: true
    host: verify.dev.edu-proof.ru
    tls:
      enabled: true
      secretName: team2-dev-verify-tls

consumer:
  image:
    repository: ghcr.io/ozzus/diasoft-gateway/gateway-consumer
    tag: latest

replayer:
  image:
    repository: ghcr.io/ozzus/diasoft-gateway/gateway-dlq-replayer
    tag: latest

env:
  HTTP_ALLOWED_ORIGINS: "*"
  HTTP_TRUSTED_PROXIES: 10.42.0.0/16,10.43.0.0/16,127.0.0.1/32
  KAFKA_SASL_ENABLED: "false"
  KAFKA_TLS_ENABLED: "false"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo.monitoring.svc.cluster.local:4317

externalSecret:
  enabled: false
  targetName: team2-gateway-dev-secrets

deploymentMetadata:
  team: team2
  environment: dev
  imageTag: latest
  registryContractVersion: latest
