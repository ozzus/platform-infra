replicas: 2
mode: prod

admin:
  existingSecret: team2-keycloak-prod-secrets

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4

ingress:
  enabled: true
  host: auth.edu-proof.ru
  tls:
    enabled: true
    secretName: team2-prod-auth-tls

realm:
  name: diasoft-team2
  frontendClientId: diasoft-web-team2
  redirectUris:
    - https://web.edu-proof.ru/*
  postLogoutRedirectUris:
    - https://web.edu-proof.ru/*
  bootstrapUsers: []

externalSecret:
  enabled: false
  targetName: team2-keycloak-prod-secrets

deploymentMetadata:
  team: team2
  environment: prod
