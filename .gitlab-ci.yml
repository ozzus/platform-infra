    - test -f docs/cutover-checklist.md
    - test -f docs/runbooks/rollback.md
    - test -f docs/runbooks/database-restore.md
    - test -f docs/runbooks/keycloak-outage.md
    - test -f docs/runbooks/kafka-lag.md
    - test -f docs/runbooks/import-backlog.md
    - test -f docs/runbooks/dlq-replay.md
    - test -f docs/runbooks/alert-delivery-smoke.md
    - test -f docs/runbooks/stage-rehearsal.md
    - test -f docs/one-server-multi-team-deploy.md

bootstrap_scripts_validate:
  stage: validate
  image: alpine:3.21
  script:
    - sh -n scripts/bootstrap-host.sh
    - sh -n scripts/bootstrap-k3s.sh
    - sh -n scripts/render-caddyfile.sh
    - sh -n scripts/render-tenant-secrets.sh
    - test -f deploy/one-server/Caddyfile.tmpl
    - test -f deploy/one-server/domains.env.example

caddy_config_validate:
  stage: validate
  image: caddy:2.9.1-alpine
  script:
    - mkdir -p /tmp/rendered
    - sh scripts/render-caddyfile.sh deploy/one-server/domains.env.example >/tmp/rendered/Caddyfile
    - caddy validate --config /tmp/rendered/Caddyfile

